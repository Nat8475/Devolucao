name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase start

      - run: cp .env.local.example .env.local

      - run: npm run test:db

      - run: npm run test

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test
        env:
          CI: true

      - run: supabase stop
        if: always()
